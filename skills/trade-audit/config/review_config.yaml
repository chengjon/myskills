# ============================================================
# MySQL
# ============================================================
mysql:
  host: "192.168.123.104"
  port: 3306
  user: "root"
  password: ""                  # 从环境变量 MYSQL_PWD 读取
  database: "hermes"

# ============================================================
# V4 6维15分评分体系 (2026-06-04 新增)
# ============================================================
v4_scoring:
  # 入场时机阈值
  boll_mid_threshold: 50.0        # BOLL %b > 50% 判为中轨上方
  boll_upper_threshold: 80.0      # BOLL %b > 80% 判为上轨区(追高嫌疑)
  boll_extreme_threshold: 95.0    # BOLL %b > 95% 判为极端高位
  trend_up_values:                # 上升趋势判定值
    - bull
    - strong_up
    - up
  trend_down_values:              # 下降趋势判定值
    - bear
    - strong_down
    - down

  # 入场质量阈值
  price_position_good: 0.3        # K线内位置 < 0.3 判为好位置
  volume_ratio_min: 1.0           # 量比 > 1.0 判为正常

  # 卖出判定阈值
  verdict:
    at_low_tolerance: 0.01        # 卖在最低附近容差 1%
    at_high_tolerance: 0.01       # 卖在最高附近容差 1%
    panic_drop_threshold: -3.0    # 卖后5日跌 > 3% 判恐慌
    discipline_hold_days: 20      # 持仓 >= 20天 判纪律卖点
    discipline_profit_pct: 15.0   # 盈利 >= 15% 判纪律卖点
    missed_profit_threshold: 8.0  # 卖后20日涨 > 8% 判卖飞
    late_stop_threshold: -3.0     # 卖后5日跌 > 3% 判晚止损

  # 风控执行阈值
  risk:
    drawdown_max: 0.05            # 持仓期内最大回撤 < 5%
    loss_max_pct: -8.0            # 单笔亏损幅度 < 8%
    position_max: 15.0            # 仓位 <= 15%

  # 行为标签阈值
  behavior:
    chase_high_boll: 80.0         # BOLL > 80% + 非上升趋势 = 追高
    bottom_fishing_boll: 20.0     # BOLL < 20% + 下降趋势 = 抄底
    consecutive_losses: 4         # 连亏 >= 4笔 = 冲动 (V4.1: 从3提高到4)
    same_day_limit: 4             # 同日 >= 4笔 = 冲动 (V4.1: 从3提高到4)
    impulsive_soft_combo: 2       # is_impulsive + (连亏或同日>=2) = 冲动
    heavy_position: 15.0          # 仓位 > 15% = 重仓
    boll_extreme_low: 5.0         # BOLL < 5% = 极端 (收窄自10%)
    boll_extreme_high: 95.0       # BOLL > 95% = 极端 (收窄自90%)

  # 交易效率阈值
  efficiency:
    profit_drawdown_max: 3.0      # 盈利交易: max_drawdown < 3% 判盈亏比好
    profit_min_rate: 5.0          # 盈利交易: pnl > 5% 判盈亏比好
    daily_return_min: 0.2         # 持仓效率 > 0.2%/天 判高效
    loss_mild_threshold: -3.0     # 亏损交易: 亏 < 3% 可得1分

  # 六级分类阈值
  grade:
    A: 12                         # >= 12 + 盈利
    B: 9                          # >= 9 + 盈利
    C_profit: 0                   # < 9 + 盈利
    D_loss: 9                     # >= 9 + 亏损
    E_min: 6                      # 6-8 + 亏损
    F_max: 5                      # <= 5 + 亏损

  # 统计可靠性
  stats:
    min_sample_size: 30           # 样本 < 30 只做描述统计

  # V4.1 规则引擎 (基于363笔分析发现的模式)
  rules:
    entry:
      - name: "禁止BOLL极端追高"
        condition: "stk_boll_pctb > 90 AND stk_trend not in (bull,strong_up,up)"
        action: "block_entry"
        reason: "追高+BOLL极端组合盈亏平衡，且过晚止损会导致大亏"
      - name: "顺势入场优先"
        condition: "stk_trend not in (bull,strong_up,up)"
        action: "reduce_score"
        score_penalty: 1
        reason: "89%逆势入场导致持仓体验差"
    exit:
      - name: "移动止盈"
        condition: "pnl_rate > 10"
        action: "trailing_stop"
        trailing_percent: 5
        reason: "62笔missed_profit(卖早了)合计少赚约5万"
      - name: "止损不延期"
        condition: "pnl_rate < -5 AND hold_days > 5"
        action: "force_stop"
        reason: "过晚止损47笔均亏-3.7%,合计亏6.5万"
    behavior:
      - name: "连亏冷却"
        condition: "consecutive_losses >= 3"
        action: "cooldown"
        cooldown_days: 3
        reason: "连亏后冲动交易占比高"

  # V5 规则引擎 (基于深度归因+验证集测试)
  # 验证方法: 训练集(2025前366笔) vs 验证集(2026Q1+Q2 713笔)
  # 综合阈值: 触发>=2条规则→减仓, >=3条→禁止
  v5_rules:
    composite_threshold:
      reduce_position: 2       # 触发2条规则→减仓(胜率38.5%)
      block_entry: 3           # 触发3条规则→禁止(胜率30.9%)

    # ---- 有效规则(验证集通过) ----
    emotional:
      - name: "tilt预警(连亏2笔)"
        condition: "consecutive_losses >= 2"
        action: "warning"
        level: "yellow"
        weight: 1
        reason: "验证集: avg_pnl=-0.97%/胜率35.7%, Δ=-1.28% vs基线"
      - name: "tilt强制冷却(连亏3笔)"
        condition: "consecutive_losses >= 3"
        action: "force_cooldown"
        cooldown_days: 3
        weight: 2
        reason: "验证集: avg_pnl=-1.35%/胜率32.1%, Δ=-1.66% vs基线"
      - name: "连亏5笔禁止交易"
        condition: "consecutive_losses >= 5"
        action: "block_entry"
        cooldown_days: 7
        weight: 2
        reason: "连亏5笔后恶化趋平但仍亏损，需强制休息"

    # ---- 最有效规则(验证集Δpnl最小) ----
    entry_boll:
      - name: "BOLL>50+Day0峰值禁止"
        condition: "stk_boll_pctb > 50 AND days_to_max_profit = 0"
        action: "block_entry"
        weight: 2
        reason: "验证集: avg_pnl=-4.17%/胜率14.4%, 过拟合Δ=0.05%最稳定"
        sample_size: "训练55笔+验证202笔"

    # ---- 浮盈管理(降级为信息提示) ----
    profit_capture:
      - name: "浮盈5%提醒止盈"
        condition: "max_profit_pct >= 5"
        action: "info"
        weight: 0
        reason: "验证集未通过(Δ+0.50% vs基线), 仅作信息提示"

    # ---- 感情股管控 ----
    emotional_stocks:
      - name: "感情股预警"
        condition: "same_stock_trades >= 5 AND same_stock_pnl_pct < -5"
        action: "warning"
        level: "red"
        loss_threshold_pct: 5              # 相对账户规模的5%（替代固定3000元）
        reason: "同股>=5笔且亏损占账户5%以上, 14只感情股总亏32.7万"
      - name: "越做越亏阻断"
        condition: "same_stock_trades >= 5 AND same_stock_pnl < 0 AND same_stock_wr_declining = true"
        action: "block_entry"
        reason: "前半胜率>后半胜率+总亏损=越做越亏模式"
      - name: "感情股黑名单"
        blacklist:
          - code: "002195"
            name: "岩山科技"
            reason: "115笔亏11.7万, 前半51%->后半21%"
          - code: "002506"
            name: "协鑫集成"
            reason: "48笔亏9万, 前半33%->后半8%"
          - code: "002929"
            name: "润建股份"
            reason: "12笔亏4.2万, 前半33%->后半17%"

    # ---- 无效规则(降级为监控) ----
    timing_monitor:
      - name: "周四监控"
        condition: "buy_weekday = 4"
        action: "monitor"
        weight: 0
        reason: "验证集未通过(Δ+0.49%), 降级为监控"

    market_env_monitor:
      - name: "弱势大盘监控"
        condition: "mkt_above_ma20 < 0.3"
        action: "monitor"
        weight: 0
        reason: "验证集弱有效(Δ-0.38%), 降级为监控"

    # ---- 纪律清单新增 (2026-06-05) ----
    frequency_control:
      - name: "同日不超过4笔"
        condition: "same_day_trades >= 4"
        action: "block_entry"
        weight: 1
        reason: "同日9笔55笔avg-3.14%亏7.6万, 同日>=4笔应停止"
      - name: "月度交易上限"
        condition: "monthly_trades >= 30"
        action: "warning"
        level: "yellow"
        weight: 0
        reason: "2026年713笔(+95%), Day0追高翻倍, 超频需复盘"

    overconfident_control:
      - name: "大幅盈利后冷却"
        condition: "daily_profit_pct >= 5"
        action: "block_new_entry_next_day"
        weight: 1
        reason: "overconfident阶段是tilt前兆, 单日>5%盈利后不开新仓"

    stop_loss:
      - name: "单笔止损-5%"
        condition: "pnl_rate <= -5"
        action: "force_stop"
        weight: 2
        reason: "连亏4笔avg-4.29%, 触及-5%无条件卖出"

    profit_stages:
      - name: "浮盈三阶段管理"
        stages:
          - trigger: "max_profit_pct >= 3"
            action: "set_breakeven_stop"
            reason: "3%保本止损, 不让盈利变亏损"
          - trigger: "max_profit_pct >= 5"
            action: "trailing_stop_3pct"
            sell_pct: 50
            reason: "5%PCR转正, 回撤3%卖出50%仓位"
          - trigger: "max_profit_pct >= 8"
            action: "tighten_stop_2pct"
            sell_pct: 100
            reason: "8%胜率77.2%, 回撤2%卖出剩余仓位"
