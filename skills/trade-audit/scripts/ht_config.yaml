# 汇通理论参数配置
# 修改此文件后无需重启，下次运行自动加载

# 选股参数
active_days: [10, 20]          # 活跃股回溯天数
active_threshold: 7.0          # 单日涨幅阈值(%)
limit_up_threshold: 9.8        # 涨停阈值(%)
trend_days: 25                 # 强趋势回溯天数
trend_gain: 35.0               # 强趋势涨幅阈值(%)
amount_top: 200                # 成交额排名取前N只

# 二次筛选
min_amount: 100000000          # 最低成交额(元, 1亿)
max_consecutive_up: 3          # 连涨≥N日且每日涨>X% → 删除
consecutive_up_pct: 5.0        # 连涨每日涨幅阈值(%)
max_upper_shadow: 3.0          # 上影线>实体×N倍 → 删除
ma_near_pct: 3.0               # 均线附近±%豁免连续下跌过滤

# 止跌信号
long_lower_shadow_ratio: 2.0
long_lower_shadow_pct: 1.5
doji_body_pct: 0.3
flat_bottom_diff_pct: 1.0
flat_bottom_shrink: 0.7
dawn_prev_min_drop: 3.0
big_yin_drop: 3.0

# 买入条件
buy_score_min: 3
small_yang_max: 3.0
limit_up_skip: 9.5
max_picks: 3
ma5_reduce_picks: 2

# 卖出条件
stop_loss_pct: -2.0
stop_loss_ma: true
high_open_sell: 3.0
ma5_take_profit: true
avg_price_timeout: 15
time_stop_hour: 14
avg_price_break_sell: true

# 大盘环境
index_code: sh000001
index_ma_period: 20
